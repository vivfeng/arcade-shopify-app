# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
#
# Canonical environment config for the `arcadeai` Shopify app (production).
# API version must stay in sync with `shopify.server.ts` (`ApiVersion` enum)
# and `shopify.app.toml`. See `docs/adr/0001-remix-to-react-router.md` for
# the version pinning rationale and the upgrade checklist.

client_id = "a431ff949b793e2470cca4094f2bf97c"
name = "Arcade.ai"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes-update"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data-request"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_fulfillments,write_fulfillments"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

[pos]
embedded = false
