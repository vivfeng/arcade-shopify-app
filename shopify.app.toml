# Shopify app configuration — DEVELOPMENT default.
#
# The production config lives in `shopify.app.arcadeai.toml` and is
# selected via `shopify app config use arcadeai`. The api_version below
# MUST match the runtime pin in `app/shopify.server.ts` and the prod
# config in `shopify.app.arcadeai.toml`. See ADR 0001 blocker B4 in
# `docs/adr/0001-remix-to-react-router.md` — version bumps touch all
# three files in a single commit.
#
# client_id will be set after `shopify app config link`

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_fulfillments,write_fulfillments"

[auth]
redirect_urls = [ "https://localhost/auth/callback" ]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes-update"

  [[webhooks.subscriptions]]
  topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[app_proxy]
  subpath_prefix = ""

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""
